# LKFL — Docker Compose Development
# Локальная разработка: полный стек без мониторинга.
#
# Запуск:   docker compose -f docker-compose.dev.yml up -d
# Логи:     docker compose -f docker-compose.dev.yml logs -f
# Остановка: docker compose -f docker-compose.dev.yml down
#
# Требуется .env (скопируйте из .env.example)
# Мониторинг (Prometheus, Grafana, Loki, Promtail) не включён — используйте
# docker-compose.staging.yml для стенда с мониторингом.

services:
  # =========================================================================
  # PostgreSQL 17 — основная база данных платформы
  # Schema: lkfl_platform (основная), keycloak (для Keycloak)
  # =========================================================================
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lkfl_platform
      POSTGRES_USER: ${POSTGRES_USER:-lkfl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lkfl-dev}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - lkfl_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lkfl} -d lkfl_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lkfl_backend

  # =========================================================================
  # Redis 7 — кэш, сессии, очереди (Asynq)
  # =========================================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
    volumes:
      - lkfl_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lkfl_backend

  # =========================================================================
  # Keycloak 25.0 — OIDC Identity Provider
  # Realm per tenant (lkfl-sdek, lkfl-tenant2, ...)
  # =========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-lkfl}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-lkfl-dev}
      KC_HTTP_RELATIVE_PATH: /
      TZ: ${TZ:-Europe/Moscow}
    command: >
      ${KEYCLOAK_START_CMD:-start-dev} --import-realm
      --http-relative-path=/
      --hostname=keycloak
      --hostname-strict=false
    volumes:
      - lkfl_keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/realm-lkfl-sdek.json:/opt/keycloak/data/import/realm-lkfl-sdek.json:ro
    healthcheck:
      # Keycloak 25.x management interface on port 9000 has /health endpoint
      # TCP check as fallback since keycloak image has no curl/wget
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health HTTP/1.0\r\nHost: localhost\r\n\r\n' >&3 && head -1 <&3 | grep -q 'HTTP/1.0 200' || exec 3<>/dev/tcp/localhost/9000 && echo ok >&3"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lkfl_backend
      - lkfl_frontend

  # =========================================================================
  # Nginx 1.27 — Reverse Proxy + SPA Serve
  # Маршрутизация: /api/v1/* → lkfl-server, / → frontend dist
  # Dev: volume mount ./frontend/dist для горячей перезагрузки фронтенда
  # =========================================================================
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/server/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      lkfl-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lkfl_frontend

  # =========================================================================
  # lkfl-server — Go backend (modular monolith)
  # 16 internal-пакетов, HTTP :8080
  # Build локально из Dockerfile target: server
  # =========================================================================
  lkfl-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    restart: unless-stopped
    # No host port mapping — routed through nginx upstream (lkfl-server:8080)
    environment:
      DB_DSN: ${DB_DSN:-postgresql://lkfl:lkfl-dev@postgres:5432/lkfl_platform?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/lkfl-sdek
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-lkfl-spa}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-changeme-dev}
      SERVER_PORT: ${SERVER_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      JWT_SECRET: ${JWT_SECRET:-changeme-dev}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ./backend:/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lkfl_backend
      - lkfl_frontend

  # =========================================================================
  # lkfl-integration-proxy — gRPC proxy к провайдерам льгот
  # gRPC :8090, HTTP webhooks :8091
  # Stub в F1, реальный в F3 (M30+)
  # =========================================================================
  lkfl-integration-proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: proxy
    restart: unless-stopped
    ports:
      - "8090:8090"
      - "8091:8091"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      TZ: ${TZ:-Europe/Moscow}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lkfl_backend
      - lkfl_frontend

  # =========================================================================
  # Frontend — React SPA build (для dev с volume mount)
  # В staging/production: отдельный образ lkfl-frontend из GHCR
  # =========================================================================
  frontend:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - lkfl_frontend

# =========================================================================
# Persistent volumes
# =========================================================================
volumes:
  lkfl_pg_data:
    driver: local
  lkfl_redis_data:
    driver: local
  lkfl_keycloak_data:
    driver: local

# =========================================================================
# Networks
# backend  — PostgreSQL, Redis, серверы (внутренняя сеть)
# frontend — Nginx, серверы, Keycloak, frontend (внешние подключения)
# =========================================================================
networks:
  lkfl_backend:
    driver: bridge
    name: lkfl_backend
  lkfl_frontend:
    driver: bridge
    name: lkfl_frontend
