# LKFL — Docker Compose (production-ready)
# Веха M17 — Bootstrap
#
# Запуск: docker compose up -d
# Логи:   docker compose logs -f
#
# Требуется .env (скопируйте из .env.example)

services:
  # =========================================================================
  # PostgreSQL 17 — основная база данных платформы
  # Schema: lkfl_platform (основная), keycloak (для Keycloak)
  # =========================================================================
  postgres:
    image: postgres:17-alpine
    container_name: lkfl-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lkfl_platform
      POSTGRES_USER: ${POSTGRES_USER:-lkfl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lkfl-dev}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - lkfl_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lkfl} -d lkfl_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
        reservations:
          memory: 256M
          cpus: "0.25"
    networks:
      - lkfl_backend

  # =========================================================================
  # Redis 7 — кэш, сессии, очереди (Asynq)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: lkfl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
    volumes:
      - lkfl_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    networks:
      - lkfl_backend

  # =========================================================================
  # Keycloak 25.0 — OIDC Identity Provider
  # Realm per tenant (lkfl-sdek, lkfl-tenant2, ...)
  # =========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: lkfl-keycloak
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-lkfl}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-lkfl-dev}
      KC_HTTP_RELATIVE_PATH: /
      TZ: ${TZ:-Europe/Moscow}
    command: >
      ${KEYCLOAK_START_CMD:-start-dev}
      --http-relative-path=/
      --hostname=localhost
      --hostname-port=8081
      --hostname-strict=false
    volumes:
      - lkfl_keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/admin/master/console/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
        reservations:
          memory: 512M
          cpus: "0.5"
    networks:
      - lkfl_backend
      - lkfl_frontend

  # =========================================================================
  # Nginx 1.27 — Reverse Proxy + SPA Serve
  # Маршрутизация: /api/v1/* → lkfl-server, / → frontend dist
  # =========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: lkfl-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Frontend dist (подключить после сборки frontend)
      # - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      lkfl-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    networks:
      - lkfl_frontend

  # =========================================================================
  # lkfl-server — Go backend (modular monolith)
  # 16 internal-пакетов, HTTP :8080
  # =========================================================================
  lkfl-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: lkfl-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_DSN: ${DB_DSN:-postgresql://lkfl:lkfl-dev@postgres:5432/lkfl_platform?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8081/realms/lkfl-sdek}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-lkfl-spa}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-changeme-dev}
      SERVER_PORT: ${SERVER_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      JWT_SECRET: ${JWT_SECRET:-changeme-dev}
      TZ: ${TZ:-Europe/Moscow}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    networks:
      - lkfl_backend
      - lkfl_frontend

  # =========================================================================
  # lkfl-integration-proxy — gRPC proxy к провайдерам льгот
  # gRPC :8090, HTTP webhooks :8091
  # Stub в F1, реальный в F3 (M30+)
  # =========================================================================
  lkfl-integration-proxy:
    build:
      context: .
      dockerfile: Dockerfile
      target: proxy
    container_name: lkfl-integration-proxy
    restart: unless-stopped
    ports:
      - "8090:8090"
      - "8091:8091"
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      TZ: ${TZ:-Europe/Moscow}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grpc_health_probe -addr=localhost:8090 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    networks:
      - lkfl_backend
      - lkfl_frontend

# =========================================================================
# Persistent volumes
# =========================================================================
volumes:
  lkfl_pg_data:
    driver: local
  lkfl_redis_data:
    driver: local
  lkfl_keycloak_data:
    driver: local

# =========================================================================
# Networks
# backend  — PostgreSQL, Redis, серверы (внутренняя сеть)
# frontend — Nginx, серверы, Keycloak (внешние подключения)
# =========================================================================
networks:
  lkfl_backend:
    driver: bridge
    name: lkfl_backend
  lkfl_frontend:
    driver: bridge
    name: lkfl_frontend
