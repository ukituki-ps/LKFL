# docker-compose.yml — Dev окружение LKFL
# Поднимает полный стек: PostgreSQL, Redis, Keycloak, Backend, Proxy, Nginx
#
# ⚠️ DEV ONLY — credentials заданы default значениями.
# Для staging/production использовать .env файл с реальными паролями.
# Никогда не коммитьте .env с production-секретами.

services:
  postgres:
    image: postgres:17-alpine
    container_name: lkfl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lkfl}
      POSTGRES_USER: ${POSTGRES_USER:-lkfl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_password} # DEV ONLY — заменить в .env
      TZ: Europe/Moscow
    volumes:
      - lkfl_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lkfl}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lkfl_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password} # DEV ONLY
    volumes:
      - lkfl_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: lkfl_keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin} # DEV ONLY — заменить в .env
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin} # DEV ONLY — заменить в .env
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lkfl}_keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-lkfl}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_password}
      KC_HTTP_PORT: 8080
      TZ: Europe/Moscow
    command: start-dev
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  lkfl-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: lkfl_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lkfl}:${POSTGRES_PASSWORD:-changeme_dev_password}@postgres:5432/${POSTGRES_DB:-lkfl}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8081}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-demo}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      TZ: Europe/Moscow
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  lkfl-integration-proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: lkfl_proxy
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      TZ: Europe/Moscow
    ports:
      - "8090:8090"
      - "8091:8091"
    depends_on:
      - lkfl-server
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  lkfl-frontend:
    image: node:20-alpine
    container_name: lkfl_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "4173:4173"
    environment:
      NODE_ENV: development
      VITE_KEYCLOAK_URL: /auth
      TZ: Europe/Moscow
  nginx:
    image: nginx:1.27-alpine
    container_name: lkfl_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/lkfl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lkfl-server
      - lkfl-frontend
      - keycloak
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: lkfl_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - lkfl_prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:3.1.0
    container_name: lkfl_loki
    restart: unless-stopped
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - lkfl_loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.1.0
    container_name: lkfl_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - lkfl_grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  lkfl_postgres_data:
    driver: local
  lkfl_redis_data:
    driver: local
  lkfl_prometheus_data:
    driver: local
  lkfl_loki_data:
    driver: local
  lkfl_grafana_data:
    driver: local
