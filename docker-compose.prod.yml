# LKFL — Docker Compose Production
# Веха M22 — F1 Hardening
#
# Запуск:  docker compose -f docker-compose.prod.yml up -d
# Логи:    docker compose -f docker-compose.prod.yml logs -f
# Остановка: docker compose -f docker-compose.prod.yml down
#
# Отличия от docker-compose.yml (dev):
# - Production образы на distroless/base-debian12 (не Alpine)
# - Read-only filesystem для application контейнеров
# - Stricter resource limits
# - No port exposure для внутренних сервисов (DB, Redis)
# - Secrets через Docker secrets / env file
# - Logging driver: json-file с ротацией
# - No monitoring stack (Prometheus/Grafana/Loki подключаются отдельно)

services:
  # =========================================================================
  # PostgreSQL 17 — основная база данных платформы
  # =========================================================================
  postgres:
    image: postgres:17-alpine
    container_name: lkfl-postgres-prod
    restart: unless-stopped
    # В production порты НЕ экспонируются наружу
    # ports:
    #   - "5432:5432"
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: lkfl_platform
      TZ: Europe/Moscow
    volumes:
      - lkfl_pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lkfl} -d lkfl_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
          cpus: "0.5"
    networks:
      - lkfl_backend

  # =========================================================================
  # Redis 7 — кэш, сессии, очереди (Asynq)
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: lkfl-redis-prod
    restart: unless-stopped
    # ports:
    #   - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --bind 0.0.0.0
      --requirepass ${REDIS_PASSWORD:-changeme-prod}
    env_file:
      - .env.prod
    volumes:
      - lkfl_redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme-prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    networks:
      - lkfl_backend

  # =========================================================================
  # Keycloak 25.0 — OIDC Identity Provider
  # =========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: lkfl-keycloak-prod
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - .env.prod
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /
      TZ: Europe/Moscow
    command: >
      start
      --import-realm
      --http-relative-path=/
      --hostname=${KEYCLOAK_HOSTNAME:-localhost}
      --hostname-port=8081
      --hostname-strict=false
    volumes:
      - lkfl_keycloak_data_prod:/opt/keycloak/data
      - ./infra/keycloak/realm-lkfl-sdek.json:/opt/keycloak/data/import/realm-lkfl-sdek.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/admin/master/console/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 1G
          cpus: "1"
    networks:
      - lkfl_backend
      - lkfl_frontend

  # =========================================================================
  # lkfl-server — Go backend (production: distroless, non-root, read-only fs)
  # =========================================================================
  lkfl-server:
    image: ${GHCR_REGISTRY:-ghcr.io/ukituki-ps/lkfl}/server:${IMAGE_TAG:-main-latest}
    container_name: lkfl-server-prod
    restart: unless-stopped
    stop_grace_period: 35s
    # No host port mapping — routed through nginx upstream (lkfl-server:8080)
    env_file:
      - .env.prod
    environment:
      DB_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/lkfl_platform?sslmode=disable
      REDIS_URL: redis://default:${REDIS_PASSWORD:-changeme-prod}@redis:6379
      KEYCLOAK_ISSUER: http://${KEYCLOAK_HOSTNAME:-localhost}:8081/realms/lkfl-sdek
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-https://${DOMAIN:-example.com}/realms/lkfl-sdek}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?KEYCLOAK_CLIENT_SECRET required}
      SERVER_PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      SENTRY_DSN: ${SENTRY_DSN:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      TZ: Europe/Moscow
    # Production: read-only filesystem + tmpfs для временных файлов
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Distroless/base-debian12: нет shell, wget, curl.
      # Рely на HTTP healthcheck deploy-worker или nginx upstream.
      test: ["NONE"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
        reservations:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - lkfl_backend
      - lkfl_frontend

  # =========================================================================
  # lkfl-integration-proxy — gRPC proxy (production: distroless, non-root)
  # Stub в F1, реальный в F3
  # =========================================================================
  lkfl-integration-proxy:
    image: ${GHCR_REGISTRY:-ghcr.io/ukituki-ps/lkfl}/proxy:${IMAGE_TAG:-main-latest}
    container_name: lkfl-integration-proxy-prod
    restart: unless-stopped
    # No host port mapping — routed through nginx upstream
    env_file:
      - .env.prod
    environment:
      REDIS_URL: redis://default:${REDIS_PASSWORD:-changeme-prod}@redis:6379
      TZ: Europe/Moscow
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32M
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      # Distroless/base-debian12: нет shell, wget, curl.
      test: ["NONE"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
        reservations:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - lkfl_backend
      - lkfl_frontend

  # =========================================================================
  # lkfl-frontend — React SPA (отдельный образ из GHCR)
  # nginx:alpine serving dist/ внутри образа
  # =========================================================================
  lkfl-frontend:
    image: ${GHCR_REGISTRY:-ghcr.io/ukituki-ps/lkfl}/frontend:${IMAGE_TAG:-main-latest}
    container_name: lkfl-frontend-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M
          cpus: "0.05"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - lkfl_frontend

  # =========================================================================
  # Nginx 1.27 — Reverse Proxy + SPA Serve (production)
  # =========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: lkfl-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lkfl-server
      - lkfl-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/nginx-health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - lkfl_frontend

# =========================================================================
# Persistent volumes (production: named volumes с driver local)
# =========================================================================
volumes:
  lkfl_pg_data_prod:
    driver: local
  lkfl_redis_data_prod:
    driver: local
  lkfl_keycloak_data_prod:
    driver: local

# =========================================================================
# Networks
# backend  — PostgreSQL, Redis, серверы (изолированная сеть)
# frontend — Nginx, серверы, Keycloak (внешние подключения)
# =========================================================================
networks:
  lkfl_backend:
    driver: bridge
    name: lkfl_backend_prod
    internal: true
  lkfl_frontend:
    driver: bridge
    name: lkfl_frontend_prod
