# docker-compose.prod.yml — Staging on serverAi
# Images from ghcr.io, persistent volumes, no observability

x-common-vars: &common-vars
  TZ: Europe/Moscow
  LOG_LEVEL: info

services:
  postgres:
    image: postgres:17-alpine
    container_name: lkfl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lkfl
      POSTGRES_USER: lkfl
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      <<: *common-vars
    volumes:
      - lkfl_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lkfl"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lkfl_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - lkfl_redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: lkfl_keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD required}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/lkfl_keycloak
      KC_DB_USERNAME: lkfl
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HTTP_PORT: 8080
      <<: *common-vars
    command: start
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

  lkfl-server:
    image: ${REGISTRY:-ghcr.io}/${ORG:-lkfl}/lkfl-server:${IMAGE_TAG:?IMAGE_TAG required}
    container_name: lkfl_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://lkfl:${POSTGRES_PASSWORD}@postgres:5432/lkfl?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: demo
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      <<: *common-vars
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  lkfl-integration-proxy:
    image: ${REGISTRY:-ghcr.io}/${ORG:-lkfl}/lkfl-integration-proxy:${IMAGE_TAG}
    container_name: lkfl_proxy
    restart: unless-stopped
    environment:
      <<: *common-vars
    ports:
      - "127.0.0.1:8090:8090"
      - "127.0.0.1:8091:8091"
    depends_on:
      - lkfl-server

  lkfl-frontend:
    image: ${REGISTRY:-ghcr.io}/${ORG:-lkfl}/lkfl-frontend:${IMAGE_TAG}
    container_name: lkfl_frontend
    restart: unless-stopped
    environment:
      <<: *common-vars
    ports:
      - "127.0.0.1:3000:80"

  nginx:
    image: nginx:1.27-alpine
    container_name: lkfl_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/lkfl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lkfl-server
      - lkfl-frontend
      - keycloak
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  lkfl_postgres_data:
    driver: local
  lkfl_redis_data:
    driver: local
