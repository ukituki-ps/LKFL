# T2213 — Manual Deploy
# Ручной деплой на staging через deploy-worker API
#
# Trigger: workflow_dispatch (ручной запуск из GitHub UI)

name: Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
      image_tag:
        description: 'Docker image tag (auto-detected if empty)'
        required: false
        default: ''

env:
  DEPLOY_URL: https://dev.april.ukituki.tech/deploy-webhook/deploy

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          BRANCH: ${{ github.event.inputs.branch }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [[ -z "$IMAGE_TAG" ]]; then
            IMAGE_TAG="${BRANCH}-latest"
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$DEPLOY_URL" \
            -H "Authorization: Bearer $DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":\"${BRANCH}\",\"imageTag\":\"${IMAGE_TAG}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "Deploy response: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "❌ Deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Deploy triggered successfully"

  # =========================================================================
  # Post-deploy smoke test
  # =========================================================================
  smoke-test:
    name: Smoke Test
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          chmod +x infra/smoke-test.sh
          infra/smoke-test.sh https://dev.april.ukituki.tech
