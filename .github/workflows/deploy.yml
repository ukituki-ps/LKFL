            -H "Content-Type: application/json" \
            -d "{\"branch\":\"${BRANCH}\",\"imageTag\":\"${IMAGE_TAG}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "Deploy response: $BODY"
          echo "HTTP status: $HTTP_CODE"

