# CD — Build & Push Docker images to GHCR
# Self-hosted runners on serverAi

name: CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile.*'
      - '.github/workflows/cd.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push Docker Images
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    outputs:
      server_tag: ${{ steps.meta-server.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push server
        run: |
          TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build -f Dockerfile.server -t ghcr.io/${{ github.repository_owner }}/lkfl-server:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/lkfl-server:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/lkfl-server:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/lkfl-server:main
          docker push ghcr.io/${{ github.repository_owner }}/lkfl-server:main

      - name: Build & Push proxy
        run: |
          docker build -f Dockerfile.proxy -t ghcr.io/${{ github.repository_owner }}/lkfl-integration-proxy:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/lkfl-integration-proxy:${{ github.sha }}

      - name: Build & Push frontend
        run: |
          docker build -f Dockerfile.frontend -t ghcr.io/${{ github.repository_owner }}/lkfl-frontend:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/lkfl-frontend:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository_owner }}/lkfl-frontend:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/lkfl-frontend:main
          docker push ghcr.io/${{ github.repository_owner }}/lkfl-frontend:main
