# T1708 — CI/CD Foundation: единый production-grade pipeline
# Заменяет ci.yml, cd.yml, deploy.yml (удалены).
#
# Все job'ы на self-hosted runner `lkfl` (serverAi: 192.168.1.27).
#
# Pipeline:
#   1. lint-test    → Go + Frontend + OpenAPI + Config validation
#   2. build-push   → Docker Buildx + GHCR (matrix: server, proxy, frontend, deploy-worker)
#   3. deploy-staging → docker compose на serverAi (auto on main push)
#   4. smoke-test-staging → infra/smoke-test.sh с retry polling
#   5. deploy-production → docker compose prod (manual workflow_dispatch)

name: Build & Deploy

on:
  push:
    branches: [main, 'feature/*']
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  GHCR_REGISTRY: ghcr.io/ukituki-ps/lkfl
  GOTOOLCHAIN: 'local'

permissions:
  contents: read
  packages: write

jobs:
  # =========================================================================
  # Job 1: LINT + TEST — self-hosted runner (lkfl label on serverAi)
  # =========================================================================
  lint-test:
    name: Lint & Test
    runs-on: lkfl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Go ──
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Go mod tidy
        working-directory: backend
        run: go mod tidy

      - name: Go vet
        working-directory: backend
        run: go vet ./...

      - name: Go unit tests (short)
        working-directory: backend
        run: go test ./... -short -count=1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: backend
          args: --timeout=5m

      # ── Frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure npm registry for @ukituki-ps packages
        working-directory: frontend
        run: |
          echo "@ukituki-ps:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ github.token }}" >> .npmrc

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vitest unit tests
        working-directory: frontend
        run: npx vitest run
        continue-on-error: true

      # ── OpenAPI ──
      - name: OpenAPI lint
        run: npx @redocly/cli@latest lint doc/спецификация/api/openapi.yaml
        continue-on-error: true

      # ── Config validation ──
      - name: Validate docker-compose config
        run: |
          # Проверка: lkfl-server должен иметь KEYCLOAK_PUBLIC_URL
          for compose_file in docker-compose.staging.yml docker-compose.prod.yml; do
            if [[ -f "$compose_file" ]]; then
              in_server=0
              has_public_url=0
              while IFS= read -r line; do
                if echo "$line" | grep -q "^  lkfl-server:"; then
                  in_server=1
                elif [[ $in_server -eq 1 ]] && echo "$line" | grep -q "^  [a-z]"; then
                  break
                elif [[ $in_server -eq 1 ]] && echo "$line" | grep -q "KEYCLOAK_PUBLIC_URL"; then
                  has_public_url=1
                  break
                fi
              done < "$compose_file"
              if [[ $has_public_url -eq 0 ]]; then
                echo "FAIL: $compose_file — lkfl-server missing KEYCLOAK_PUBLIC_URL"
                exit 1
              fi
              echo "OK: $compose_file has KEYCLOAK_PUBLIC_URL"
            fi
          done

          # Проверка: KC_HOSTNAME не должен быть internal hostname
          for compose_file in docker-compose.staging.yml docker-compose.prod.yml; do
            if [[ -f "$compose_file" ]]; then
              hostname=$(grep "KC_HOSTNAME:" "$compose_file" | head -1 | awk '{print $2}' | tr -d '"' | tr -d ' ')
              if [[ -n "$hostname" ]] && [[ "$hostname" == "keycloak" || "$hostname" == "localhost" ]]; then
                echo "FAIL: $compose_file — KC_HOSTNAME='$hostname' is internal"
                exit 1
              fi
            fi
          done
          echo "OK: KC_HOSTNAME validation passed"

  # =========================================================================
  # Job 2: BUILD + PUSH — self-hosted runner (lkfl label on serverAi)
  # =========================================================================
  build-push:
    name: Build & Push Docker
    needs: [lint-test]
    runs-on: lkfl
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        service: [server, proxy, frontend, deploy-worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tag=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=main-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[\/]/-/g')
            echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          build-args: |
            NPM_TOKEN=${{ github.token }}
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ (github.ref == 'refs/heads/main' && format('{0}/{1}:main-latest', env.GHCR_REGISTRY, matrix.service)) || '' }}

  # =========================================================================
  # Job 3: DEPLOY STAGING — auto on main push
  # =========================================================================
  deploy-staging:
    name: Deploy Staging
    needs: [build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: lkfl
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "tag=main-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Sync compose + env to serverAi
        run: |
          # Runner уже на serverAi, файлы в GITHUB_WORKSPACE
          STAGING_DIR="/home/ukituki/LKFL-staging"
          cp docker-compose.staging.yml "$STAGING_DIR/"
          echo "IMAGE_TAG=${{ steps.tag.outputs.tag }}" >> "$STAGING_DIR/.env.staging"
          echo "GHCR_REGISTRY=${{ env.GHCR_REGISTRY }}" >> "$STAGING_DIR/.env.staging"

      - name: Pull images
        working-directory: /home/ukituki/LKFL-staging
        run: |
          export IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          export GHCR_REGISTRY="${{ env.GHCR_REGISTRY }}"
          docker compose -f docker-compose.staging.yml --env-file /home/ukituki/LKFL-staging/.env.staging -p lkfl-staging pull --ignore-buildable

      - name: Run migrations (retry 3x)
        working-directory: /home/ukituki/LKFL-staging
        run: |
          export IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          export GHCR_REGISTRY="${{ env.GHCR_REGISTRY }}"
          for i in 1 2 3; do
            echo "Migration attempt $i..."
            if docker compose -f docker-compose.staging.yml --env-file /home/ukituki/LKFL-staging/.env.staging -p lkfl-staging run --rm lkfl-migrate; then
              echo "Migrations applied successfully"
              break
            fi
            if [[ $i -lt 3 ]]; then
              echo "Retry in 10s..."
              sleep 10
            fi
          done

      - name: Run seed
        working-directory: /home/ukituki/LKFL-staging
        run: |
          export IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          export GHCR_REGISTRY="${{ env.GHCR_REGISTRY }}"
          docker compose -f docker-compose.staging.yml --env-file /home/ukituki/LKFL-staging/.env.staging -p lkfl-staging run --rm lkfl-seed || \
            echo "Warning: seed may have failed (data might already exist)"

      - name: Stop old staging services
        working-directory: /home/ukituki/LKFL-staging
        run: |
          docker compose -f docker-compose.staging.yml --env-file /home/ukituki/LKFL-staging/.env.staging -p lkfl-staging down || \
            echo "No old staging services to stop"

      - name: Start services
        working-directory: /home/ukituki/LKFL-staging
        run: |
          export IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          export GHCR_REGISTRY="${{ env.GHCR_REGISTRY }}"
          docker compose -f docker-compose.staging.yml --env-file /home/ukituki/LKFL-staging/.env.staging -p lkfl-staging up -d

      - name: Health check polling
        run: |
          echo "Waiting for services to become healthy..."
          for attempt in $(seq 1 10); do
            ALL_OK=true

            # Server health check
            if curl -sf http://127.0.0.1:18080/healthz >/dev/null 2>&1; then
              echo "  ✅ lkfl-server healthy"
            else
              echo "  ❌ lkfl-server not ready"
              ALL_OK=false
            fi

            # Frontend health check
            if curl -sf http://127.0.0.1:8084/ >/dev/null 2>&1; then
              echo "  ✅ lkfl-frontend healthy"
            else
              echo "  ❌ lkfl-frontend not ready"
              ALL_OK=false
            fi

            # Keycloak health check
            if curl -sf http://127.0.0.1:19081/health/ready >/dev/null 2>&1; then
              echo "  ✅ keycloak healthy"
            else
              echo "  ❌ keycloak not ready"
              ALL_OK=false
            fi

            if [[ "$ALL_OK" == "true" ]]; then
              echo "All services healthy!"
              break
            fi

            if [[ $attempt -eq 10 ]]; then
              echo "❌ Health check failed after 10 attempts"
              docker compose -f docker-compose.staging.yml --env-file /home/ukituki/LKFL-staging/.env.staging -p lkfl-staging logs --tail=50
              exit 1
            fi

            echo "Attempt $attempt/10 — waiting 15s..."
            sleep 15
          done

      - name: Clean old images
        run: docker image prune -f

  # =========================================================================
  # Job 4: SMOKE TEST STAGING — после deploy-staging
  # =========================================================================
  smoke-test-staging:
    name: Smoke Test Staging
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: lkfl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests with retry
        run: |
          chmod +x infra/smoke-test.sh
          # 5 попыток с интервалом 10s
          MAX_ATTEMPTS=5 infra/smoke-test.sh --retry 5 https://dev.april.ukituki.tech

  # =========================================================================
  # Job 5: DEPLOY PRODUCTION — manual workflow_dispatch
  # =========================================================================
  deploy-production:
    name: Deploy Production
    needs: [smoke-test-staging]
    if: github.event_name == 'workflow_dispatch'
    runs-on: lkfl
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "tag=main-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Sync compose + env to serverAi
        run: |
          PROD_DIR="/home/ukituki/LKFL-prod"
          mkdir -p "$PROD_DIR"
          cp docker-compose.prod.yml "$PROD_DIR/"
          echo "IMAGE_TAG=${{ steps.tag.outputs.tag }}" >> "$PROD_DIR/.env.prod"
          echo "GHCR_REGISTRY=${{ env.GHCR_REGISTRY }}" >> "$PROD_DIR/.env.prod"

      - name: Pull images
        working-directory: /home/ukituki/LKFL-prod
        run: |
          export IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          export GHCR_REGISTRY="${{ env.GHCR_REGISTRY }}"
          docker compose -f docker-compose.prod.yml --env-file /home/ukituki/LKFL-prod/.env.prod -p lkfl-prod pull --ignore-buildable

      - name: Run migrations (retry 3x)
        working-directory: /home/ukituki/LKFL-prod
        run: |
          export IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          export GHCR_REGISTRY="${{ env.GHCR_REGISTRY }}"
          for i in 1 2 3; do
            echo "Migration attempt $i..."
            if docker compose -f docker-compose.prod.yml --env-file /home/ukituki/LKFL-prod/.env.prod -p lkfl-prod run --rm lkfl-migrate; then
              echo "Migrations applied successfully"
              break
            fi
            if [[ $i -lt 3 ]]; then
              echo "Retry in 10s..."
              sleep 10
            fi
          done

      - name: Run seed
        working-directory: /home/ukituki/LKFL-prod
        run: |
          export IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          export GHCR_REGISTRY="${{ env.GHCR_REGISTRY }}"
          docker compose -f docker-compose.prod.yml --env-file /home/ukituki/LKFL-prod/.env.prod -p lkfl-prod run --rm lkfl-seed || \
            echo "Warning: seed may have failed (data might already exist)"

      - name: Stop old prod services
        working-directory: /home/ukituki/LKFL-prod
        run: |
          docker compose -f docker-compose.prod.yml --env-file /home/ukituki/LKFL-prod/.env.prod -p lkfl-prod down || \
            echo "No old prod services to stop"

      - name: Start services
        working-directory: /home/ukituki/LKFL-prod
        run: |
          export IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          export GHCR_REGISTRY="${{ env.GHCR_REGISTRY }}"
          docker compose -f docker-compose.prod.yml --env-file /home/ukituki/LKFL-prod/.env.prod -p lkfl-prod up -d

      - name: Health check polling
        run: |
          echo "Waiting for production services..."
          for attempt in $(seq 1 10); do
            ALL_OK=true

            if curl -sf http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "  ✅ lkfl-server healthy"
            else
              echo "  ❌ lkfl-server not ready"
              ALL_OK=false
            fi

            if curl -sf http://127.0.0.1:3000/ >/dev/null 2>&1; then
              echo "  ✅ lkfl-frontend healthy"
            else
              echo "  ❌ lkfl-frontend not ready"
              ALL_OK=false
            fi

            if curl -sf http://127.0.0.1:8081/health/ready >/dev/null 2>&1; then
              echo "  ✅ keycloak healthy"
            else
              echo "  ❌ keycloak not ready"
              ALL_OK=false
            fi

            if [[ "$ALL_OK" == "true" ]]; then
              echo "All production services healthy!"
              break
            fi

            if [[ $attempt -eq 10 ]]; then
              echo "❌ Production health check failed after 10 attempts"
              docker compose -f docker-compose.prod.yml --env-file /home/ukituki/LKFL-prod/.env.prod -p lkfl-prod logs --tail=50
              exit 1
            fi

            echo "Attempt $attempt/10 — waiting 15s..."
            sleep 15
          done

      - name: Clean old images
        run: docker image prune -f
