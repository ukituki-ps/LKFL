# T2213 — Build Pipeline
# Заменяет ci.yml. Использует serverAI self-hosted runners для Docker build.
#
# Stages:
#   1. Lint + Test — public runner (ubuntu-latest)
#   2. Docker Build + Push — self-hosted runner (lkfl label on serverAI)
#   3. Deploy notification — webhook на deploy-worker (только main)

name: Build

on:
  push:
    branches: [main, 'feature/*']
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  GHCR_REGISTRY: ghcr.io/ukituki-ps/lkfl
  GOTOOLCHAIN: 'local'

permissions:
  contents: read
  packages: write

jobs:
  # =========================================================================
  # 1. LINT + TEST — public runner (лёгкие операции)
  # =========================================================================
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Go ──
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Go mod tidy
        working-directory: backend
        run: go mod tidy

      - name: Go vet
        working-directory: backend
        run: go vet ./...

      - name: Go unit tests (short)
        working-directory: backend
        run: go test ./... -short -count=1

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: backend
          args: --timeout=5m

      # ── Frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure npm registry for @ukituki-ps packages
        working-directory: frontend
        run: |
          echo "@ukituki-ps:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ github.token }}" >> .npmrc

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint src/

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  # =========================================================================
  # 2. DOCKER BUILD + PUSH — self-hosted runner на serverAI
  # =========================================================================
  build-push:
    name: Build & Push Docker
    needs: [lint-test]
    runs-on: lkfl  # ← self-hosted runner на serverAI (label: lkfl)
    strategy:
      fail-fast: false
      matrix:
        service: [server, proxy, frontend, deploy-worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tag=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=main-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[\/]/-/g')
            echo "tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # КРИТИЧНО: login ДО build — для push в GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          build-args: |
            NPM_TOKEN=${{ github.token }}
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ matrix.service }}:${{ steps.tag.outputs.tag }}
            ${{ (github.ref == 'refs/heads/main' && format('{0}/{1}:main-latest', env.GHCR_REGISTRY, matrix.service)) || '' }}

  # =========================================================================
  # 3. DEPLOY NOTIFICATION — только push в main
  # =========================================================================
  deploy-notify:
    name: Notify Deploy Worker
    needs: [build-push]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send deploy webhook
        env:
          DEPLOY_URL: https://dev.april.ukituki.tech/deploy-webhook/deploy
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE_TAG="main-${SHORT_SHA}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$DEPLOY_URL" \
            -H "Authorization: Bearer $DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":\"${{ github.ref_name }}\",\"sha\":\"${GITHUB_SHA}\",\"imageTag\":\"${IMAGE_TAG}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "Deploy webhook response: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "❌ Deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Deploy notification sent successfully"
