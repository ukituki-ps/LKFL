# CI — Full pipeline: Go backend + Frontend + E2E
# Self-hosted runners on serverAi (7 instances)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go Backend ────────────────────────────────────────────
  go:
    name: Go Backend
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        run: |
          export PATH="$PATH:/home/ukituki/go/bin"
          go version

      - name: Tidy
        run: |
          export PATH="$PATH:/home/ukituki/go/bin"
          cd backend && go mod tidy

      - name: Vet
        run: |
          export PATH="$PATH:/home/ukituki/go/bin"
          cd backend && go vet ./...

      - name: Build
        run: |
          export PATH="$PATH:/home/ukituki/go/bin"
          cd backend && go build ./...

      - name: Test
        run: |
          export PATH="$PATH:/home/ukituki/go/bin"
          cd backend && go test -v -race -coverprofile=coverage.out ./...

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          node --version
          npm --version

      - name: Install
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          cd frontend && npm ci

      - name: Lint
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          cd frontend && npm run lint
        continue-on-error: true

      - name: Typecheck
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          cd frontend && npm run typecheck

      - name: Build
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          cd frontend && npm run build

      - name: Unit Tests
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          cd frontend && npm run test:run

  # ── OpenAPI Lint ──────────────────────────────────────────
  openapi:
    name: OpenAPI Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
      - name: Lint OpenAPI
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          npx @redocly/cli@latest lint openapi/openapi.yaml
        continue-on-error: true

  # ── E2E Tests ─────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: self-hosted
    needs: [frontend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20

      - name: Install
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          cd frontend && npm ci

      - name: Install Playwright
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm use 20
          cd frontend && npm run test:e2e
        continue-on-error: true  # E2E needs running services
