# ============================================================================
# LKFL — Nginx конфиг для serverAi (192.168.1.27)
# ============================================================================
#
# Назначение:
#   Проксирование внешних запросов на внутренние Docker-сервисы LKFL.
#   Nginx слушает порт 18000 и распределяет трафик по location.
#
# Фактические порты Docker-сервисов:
#   lkfl-server:              127.0.0.1:8083  (container 8080)
#   lkfl-frontend:            127.0.0.1:8084  (container 80)
#   keycloak:                 127.0.0.1:8085  (container 8080)
#   lkfl-integration-proxy:   127.0.0.1:8091  (container 8091) — TBD
#   lkfl-deploy-worker:       127.0.0.1:9092  (container 9092) — TBD
#
# Установка:
#   Скопировать в /etc/nginx/sites-available/lkfl-internal.conf
#   Ссылка: sites-enabled/lkfl-internal.conf → sites-available/...
#   nginx -t && nginx -s reload
#
# ============================================================================

server {
    listen 18000;
    server_name _;

    # ------------------------------------------------------------------
    # Логи
    # ------------------------------------------------------------------
    access_log /var/log/nginx/lkfl-access.log;
    error_log /var/log/nginx/lkfl-error.log warn;

    # ------------------------------------------------------------------
    # Ограничение размера загружаемых файлов (для API)
    # ------------------------------------------------------------------
    client_max_body_size 50m;

    # ------------------------------------------------------------------
    # API → lkfl-server (backend, 127.0.0.1:8083)
    # ------------------------------------------------------------------
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8083/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Admin API → lkfl-server (административный API, 127.0.0.1:8083)
    # ------------------------------------------------------------------
    location /admin/ {
        proxy_pass http://127.0.0.1:8083/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Health check → lkfl-server (проверка здоровья бэкенда, 127.0.0.1:8083)
    # ------------------------------------------------------------------
    location /healthz {
        proxy_pass http://127.0.0.1:8083/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Nginx собственный health check (для мониторинга)
    # ------------------------------------------------------------------
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ------------------------------------------------------------------
    # Keycloak — discovery endpoint + realms (OIDC, 127.0.0.1:8085)
    # ------------------------------------------------------------------
    location /realms/ {
        proxy_pass http://127.0.0.1:8085/realms/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Keycloak — services (внутренние сервисы Keycloak, 127.0.0.1:8085)
    # ------------------------------------------------------------------
    location /services/ {
        proxy_pass http://127.0.0.1:8085/services/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Deploy webhook → deploy-worker (приём вебхуков деплоя, 127.0.0.1:9092)
    # ------------------------------------------------------------------
    location /deploy-webhook/ {
        proxy_pass http://127.0.0.1:9092/deploy-webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Webhooks от провайдеров → integration-proxy (внешние вебхуки)
    # ------------------------------------------------------------------
    location /webhooks/ {
        proxy_pass http://127.0.0.1:8091/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ------------------------------------------------------------------
    # Frontend SPA (fallback) — React-приложение (127.0.0.1:8084)
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8084/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
