# LKFL — Server Nginx config
# Routes external traffic to internal Docker services
# External Nginx → dev.april.ukituki.tech → this server:80 → LKFL Nginx

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

upstream lkfl_server {
    server lkfl-server:8080;
}

upstream lkfl_frontend {
    server lkfl-frontend:80;
}

upstream keycloak {
    server keycloak:8080;
}

# Deploy worker — webhook endpoint для CI/CD
upstream deploy_worker {
    server lkfl-deploy-worker:9092;
}

server {
    listen 80;
    server_name dev.april.ukituki.tech localhost;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Health endpoint (для healthcheck nginx в docker-compose)
    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # CORS preflight for API
    location /api {
        limit_req zone=api burst=20 nodelay;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://lkfl_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Staging-only: tenant resolution по X-Tenant-ID.
        # TODO M23+: динамическое разрешение по hostname.
        proxy_set_header X-Tenant-ID sdek;
    }

    # Admin API
    location /admin {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://lkfl_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Staging-only: tenant resolution по X-Tenant-ID.
        # TODO M23+: динамическое разрешение по hostname.
        proxy_set_header X-Tenant-ID sdek;
    }

    # Keycloak OAuth2 callback — POST → GET redirect, затем proxy на backend
    location = /callback {
        limit_req zone=login burst=5 nodelay;
        if ($request_method = POST) {
            return 302 /callback$is_args$args;
        }
        rewrite ^/callback$ /api/v1/auth/callback break;
        proxy_pass http://lkfl_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (proxy на lkfl-server)
    location /healthz {
        proxy_pass http://lkfl_server;
        proxy_set_header Host $host;
    }

    # Deploy worker webhook — CI/CD deploy trigger
    location /deploy-webhook/ {
        rewrite ^/deploy-webhook/(.*) /$1 break;
        proxy_pass http://deploy_worker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Keycloak routes — external HTTPS → internal HTTP
    # Use hardcoded https/443 because external Nginx terminates TLS
    location /realms {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
    }

    location /protocol {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
    }

    location /resources {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location /services {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
    }

    location /account {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
    }

    # Keycloak login-actions — POST form submissions during auth flow
    location /login-actions {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
    }

    # Frontend — proxy на lkfl-frontend (НЕ static из volume)
    # index.html — never cache (always fetch latest)
    location = /index.html {
        proxy_pass http://lkfl_frontend;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Hashed assets — long-term cache (filename includes content hash)
    location ~ ^/assets/.*\.[a-zA-Z0-9]+\.(js|css|map)$ {
        proxy_pass http://lkfl_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA fallback — proxy на lkfl-frontend
    location / {
        proxy_pass http://lkfl_frontend;
    }
}
