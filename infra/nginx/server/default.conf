# LKFL — Server Nginx config
# Routes external traffic to internal Docker services
# External Nginx → dev.april.ukituki.tech → this server:8080 → LKFL Nginx

upstream lkfl_server {
    server lkfl-server:8080;
}

upstream keycloak {
    server keycloak:8080;
}

server {
    listen 80;
    listen 8080;
    server_name dev.april.ukituki.tech localhost;

    # Increase client body size for file uploads
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # CORS preflight for API
    location /api {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 3600;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://lkfl_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Dev: tenant resolution — host is dev.april.ukituki.tech (slug=dev)
        # but tenant in DB is sdek. Use X-Tenant-ID as fallback for localhost/dev hosts.
        proxy_set_header X-Tenant-ID sdek;
    }

    # Admin API
    location /admin {
        proxy_pass http://lkfl_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Tenant-ID sdek;
    }

    # Keycloak OAuth2 callback — Keycloak POST-redirects here after login.
    # Convert POST to 302 GET redirect so browser re-requests /callback as GET.
    # The GET request hits the frontend (Catch-all /) which renders Callback.tsx.
    # Callback.tsx then fetches /api/v1/auth/callback (API) for token exchange.
    location = /callback {
        if ($request_method = POST) {
            return 302 /callback$is_args$args;
        }
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        gzip on;
    }

    # Health check
    location /healthz {
        proxy_pass http://lkfl_server;
        proxy_set_header Host $host;
    }

    # Keycloak routes — external HTTPS → internal HTTP
    # Use hardcoded https/443 because external Nginx terminates TLS
    location /realms {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
    }

    location /protocol {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
    }

    location /resources {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location /services {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
    }

    location /account {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffering off;
    }

    # Frontend (static files)
    # index.html — never cache (always fetch latest)
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Expires "0" always;
        gzip on;
    }

    # Hashed assets — long-term cache (filename includes content hash)
    location ~ ^/assets/.*\.[a-zA-Z0-9]+\.(js|css|map)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        gzip on;
    }

    # Other static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    }
}
