# ============================================================================
# LKFL — Nginx конфиг для serverPr01 (192.168.1.46)
# ============================================================================
#
# Назначение:
#   Проксирование ВСЕХ запросов на serverAi:18000.
#   serverPr01 работает как обратный прокси-сервер к serverAi.
#
# Архитектура:
#   Клиент → serverPr01:18000 (nginx) → serverAi:18000 (nginx) → Docker-сервисы
#
# Установка:
#   Скопировать в /etc/nginx/sites-available/lkfl-internal.conf
#   Ссылка: sites-enabled/lkfl-internal.conf → sites-available/...
#   nginx -t && nginx -s reload
#
# ============================================================================

server {
    listen 18000;
    server_name _;

    # ------------------------------------------------------------------
    # Логи
    # ------------------------------------------------------------------
    access_log /var/log/nginx/lkfl-access.log;
    error_log /var/log/nginx/lkfl-error.log warn;

    # ------------------------------------------------------------------
    # Ограничение размера загружаемых файлов
    # ------------------------------------------------------------------
    client_max_body_size 50m;

    # ------------------------------------------------------------------
    # Nginx собственный health check (локальный)
    # ------------------------------------------------------------------
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ------------------------------------------------------------------
    # Всё остальное → serverAi (192.168.1.27:18000)
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://192.168.1.27:18000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Таймауты подключения к serverAi
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
