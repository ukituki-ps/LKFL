# LKFL — Nginx Reverse Proxy Configuration
# Production-ready: proxy headers, timeouts, buffering, security headers

upstream lkfl_server {
    server lkfl-server:8080;
    keepalive 32;
}

upstream lkfl_frontend {
    server lkfl-frontend:80;
    keepalive 16;
}

upstream lkfl_proxy {
    server lkfl-integration-proxy:8091;
    keepalive 16;
}

# Rate limiting zone (10 req/s per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Client body size limit (10M for file uploads)
    client_max_body_size 10M;

    # API — Public endpoints
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://lkfl_server/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Admin API
    location /admin/ {
        proxy_pass http://lkfl_server/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Webhooks — от провайдеров льгот к integration-proxy
    location /webhooks/ {
        proxy_pass http://lkfl_proxy/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Keycloak OAuth2 callback
    location = /callback {
        limit_req zone=api_limit burst=5 nodelay;
        if ($request_method = POST) {
            return 302 /callback$is_args$args;
        }
        proxy_pass http://lkfl_frontend;
        proxy_set_header Host $host;
    }

    # Frontend — proxy на lkfl-frontend (НЕ static из volume)
    # index.html — never cache (always fetch latest)
    location = /index.html {
        proxy_pass http://lkfl_frontend;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Hashed assets — long-term cache (filename includes content hash)
    location ~ ^/assets/.*\.[a-zA-Z0-9]+\.(js|css|map)$ {
        proxy_pass http://lkfl_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA fallback — proxy на lkfl-frontend
    location / {
        proxy_pass http://lkfl_frontend;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
