# LKFL — Nginx Staging Configuration
# Reverse proxy + TLS (self-signed) для staging стенда.

upstream lkfl_server {
    server lkfl-server:8080;
    keepalive 32;
}

upstream lkfl_proxy {
    server lkfl-integration-proxy:8091;
    keepalive 16;
}

upstream frontend_app {
    server frontend:80;
    keepalive 16;
}

# Rate limiting zone (10 req/s per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# =========================================================================
# HTTP → HTTPS redirect
# =========================================================================
server {
    listen 80;
    server_name staging.lkfl.local _;

    # Health check доступен по HTTP (для docker healthcheck)
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Всё остальное → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================================================================
# HTTPS — основной сервер
# =========================================================================
server {
    listen 443 ssl;
    http2 on;
    server_name staging.lkfl.local _;

    # Self-signed TLS
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Client body size limit (10M for file uploads)
    client_max_body_size 10M;

    # =========================================================================
    # API — Public endpoints
    # =========================================================================
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://lkfl_server/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # =========================================================================
    # Admin API
    # =========================================================================
    location /admin/ {
        proxy_pass http://lkfl_server/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # =========================================================================
    # Webhooks — от провайдеров льгот к integration-proxy
    # =========================================================================
    location /webhooks/ {
        proxy_pass http://lkfl_proxy/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # =========================================================================
    # Health check (backend)
    # =========================================================================
    location /healthz {
        proxy_pass http://lkfl_server/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # =========================================================================
    # Metrics (Prometheus)
    # =========================================================================
    location /metrics {
        proxy_pass http://lkfl_server/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # =========================================================================
    # Frontend SPA — React
    # =========================================================================
    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
